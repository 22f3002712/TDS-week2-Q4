name: Cache CI

on:
  push:
    branches:
      - main

jobs:
  cache-job:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - run: |
          mkdir -p dependencies
          echo "dependency-file" > dependencies/file.txt

      - id: cache-step
        uses: actions/cache@v4
        with:
          path: dependencies
          key: cache-3a5718a

      - name: prime-cache-3a5718a
        run: echo ${{ steps.cache-step.outputs.cache-hit }}